<script>

function updateTimer(){

    const isPortrait = window.innerHeight > window.innerWidth;

    const pcTimer = document.getElementById("timera342678129c201109c1fab7a773d9f1c");
    const mbTimer = document.getElementById("timer34c28ae02eebd63eeaa02f02d6c6609d");

    if(isPortrait){
        pcTimer.style.display = "none";
        mbTimer.style.display = "block";
    } else {
        pcTimer.style.display = "block";
        mbTimer.style.display = "none";
    }

}

window.addEventListener("load", updateTimer);
window.addEventListener("resize", updateTimer);

</script>
